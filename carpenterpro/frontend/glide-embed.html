<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useReducer, useMemo } = React;

    // ── localCache ──────────────────────────────────────────────────────────

    let localDatabaseCache = {
      user: { user_id: 'GUEST_USER', business_name: '', region_zip_code: '', subscription_tier: 'free' },
      projects: [],
      sections: [],
      materials: [],
      labor: []
    };

    const localCache = {
      getSaveState: () => localDatabaseCache,
      saveProjectOffline: (project, sections, materials, labor) => {
        project.last_modified_at = new Date().toISOString();
        localDatabaseCache.projects = [project];
        localDatabaseCache.sections = sections;
        localDatabaseCache.materials = materials;
        localDatabaseCache.labor = labor;
        console.log("💾 Step saved securely inside the local device cache vault.");
      },
      convertToPermanentUser: (userId, email, businessName, zip) => {
        localCache.user = { user_id: userId, business_name: businessName, region_zip_code: zip, subscription_tier: 'free', email };
        if (localDatabaseCache.projects[0]) {
          localDatabaseCache.projects[0].user_id = userId;
        }
        console.log("👤 Local cache migrated from anonymous guest to account ID: " + userId);
      }
    };

    // ── syncEngine ──────────────────────────────────────────────────────────

    async function syncProjectToCloud(localProject, cloudProjectMirror) {
      const localTimestamp = new Date(localProject.last_modified_at).getTime();
      const cloudTimestamp = cloudProjectMirror ? new Date(cloudProjectMirror.last_modified_at).getTime() : 0;

      if (localTimestamp > cloudTimestamp) {
        console.log(`⚙️ Local modifications are newer. Initializing server sync pipeline...`);
        try {
          const response = await fetch('http://localhost:3000/v1/projects/sync', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ project: localProject, sync_timestamp: new Date().toISOString() })
          });
          const data = await response.json();
          return data.success;
        } catch (err) {
          console.log("📴 Sync connection offline. Bid remains securely stored in local storage cache.");
          return false;
        }
      }
      return false;
    }

    async function pushPendingChanges(authToken) {
      const { projects } = localCache.getSaveState();
      const localProject = projects[0];
      if (!localProject) return { pushed: 0 };
      const didSync = await syncProjectToCloud(localProject, null);
      return { pushed: didSync ? 1 : 0 };
    }

    // ── calcEngine ──────────────────────────────────────────────────────────

    function calculateProjectTotal(project, sections, materials, laborTasks, defaultMarkup) {
      const markupMultiplier = 1 + (defaultMarkup / 100);
      let totalProjectMaterialsCost = 0;
      let totalProjectLaborCost = 0;
      const sectionBreakdowns = {};

      sections.forEach(section => {
        sectionBreakdowns[section.section_id] = {
          area_name: section.area_name,
          raw_materials_subtotal: 0,
          raw_labor_subtotal: 0
        };
      });

      materials.forEach(mat => {
        const cost = mat.qty * mat.unit_cost;
        totalProjectMaterialsCost += cost;
        if (sectionBreakdowns[mat.section_id]) {
          sectionBreakdowns[mat.section_id].raw_materials_subtotal += cost;
        }
      });

      laborTasks.forEach(task => {
        const cost = task.crew_size * task.hours_estimated * task.hourly_rate;
        totalProjectLaborCost += cost;
        if (sectionBreakdowns[task.section_id]) {
          sectionBreakdowns[task.section_id].raw_labor_subtotal += cost;
        }
      });

      const clientProposalSections = Object.keys(sectionBreakdowns).map(sectionId => {
        const sec = sectionBreakdowns[sectionId];
        const rawSectionTotal = sec.raw_materials_subtotal + sec.raw_labor_subtotal;
        return {
          section_id: sectionId,
          area_name: sec.area_name,
          lump_sum_price: Math.round((rawSectionTotal * markupMultiplier) * 100) / 100
        };
      });

      const totalRawCostBasis = totalProjectMaterialsCost + totalProjectLaborCost;
      const finalTotalBid = Math.round((totalRawCostBasis * markupMultiplier) * 100) / 100;

      return {
        database_update: {
          project_id: project.project_id,
          total_materials_cost: totalProjectMaterialsCost,
          total_labor_cost: totalProjectLaborCost,
          markup_percent: defaultMarkup,
          total_bid: finalTotalBid,
          last_modified_at: new Date().toISOString()
        },
        client_proposal_view: {
          sections: clientProposalSections,
          grand_total: finalTotalBid
        }
      };
    }

    // ── SaveProgressModal ───────────────────────────────────────────────────

    function SaveProgressModal({ isOpen, onSave, onClose }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      if (!isOpen) return null;
      return (
        <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, background: '#1a1a1a', color: '#fff', padding: 24, borderTopLeftRadius: 16, borderTopRightRadius: 16, boxShadow: '0 -4px 10px rgba(0,0,0,0.3)', zIndex: 1000 }}>

          <p style={{ color: '#ccc', fontSize: 14, marginBottom: 16 }}>
            Nice work. Your estimate is fully calculated using live regional pricing. Enter an email and password to lock in this record and claim your first 3 free projects.

          <input type="email" placeholder="Your Email Address" value={email} onChange={e => setEmail(e.target.value)}

          <input type="password" placeholder="Create Password" value={password} onChange={e => setPassword(e.target.value)}

    // ── EstimatorDashboard ──────────────────────────────────────────────────

    function dashReducer(state, action) {
      switch (action.type) {
        case 'LOAD': return action.payload;
        case 'UPDATE_MATERIAL':
          return { ...state, materials: state.materials.map(m => m.material_id === action.materialId ? { ...m, [action.field]: action.value } : m) };
        case 'UPDATE_LABOR':
          return { ...state, labor: state.labor.map(l => l.labor_id === action.laborId ? { ...l, [action.field]: action.value } : l) };
        default: return state;
      }
    }

    function EstimatorDashboard({ project, authToken, onBack }) {
      const [state, dispatch] = useReducer(dashReducer, { sections: [], materials: [], labor: [] });
      const [dirty, setDirty] = useState(false);
      const [modalOpen, setModalOpen] = useState(false);
      const [syncing, setSyncing] = useState(false);

      useEffect(() => {
        const { sections, materials, labor } = localCache.getSaveState();
        dispatch({ type: 'LOAD', payload: { sections, materials, labor } });
      }, [project.project_id]);

      const calc = useMemo(() => {
        if (!state.sections.length) return null;
        return calculateProjectTotal(project, state.sections, state.materials, state.labor, project.markup_percent ?? 20);
      }, [project, state]);

      const lumpSumById = useMemo(() => {
        if (!calc) return {};
        return Object.fromEntries(calc.client_proposal_view.sections.map(s => [s.section_id, s.lump_sum_price]));
      }, [calc]);

      function updateMaterial(materialId, field, value) {
        dispatch({ type: 'UPDATE_MATERIAL', materialId, field, value });
        setDirty(true);
      }

      function updateLabor(laborId, field, value) {
        dispatch({ type: 'UPDATE_LABOR', laborId, field, value });
        setDirty(true);
      }

      function persistLocally() {
        if (!calc) return;
        localCache.saveProjectOffline({ ...project, ...calc.database_update }, state.sections, state.materials, state.labor);
        setDirty(false);
      }

      async function handleSaveAccount(email, password) {
        persistLocally();
        setSyncing(true);
        try { await pushPendingChanges(authToken); } catch (e) { console.error(e); }
        setSyncing(false);
        setModalOpen(false);
      }

      const materialsBySection = {};
      const laborBySection = {};
      state.materials.forEach(m => { (materialsBySection[m.section_id] = materialsBySection[m.section_id] || []).push(m); });
      state.labor.forEach(l => { (laborBySection[l.section_id] = laborBySection[l.section_id] || []).push(l); });

      const grandTotal = calc?.client_proposal_view.grand_total ?? 0;
      const totalMaterials = calc?.database_update.total_materials_cost ?? 0;
      const totalLabor = calc?.database_update.total_labor_cost ?? 0;

      return (
        <div style={{ maxWidth: 480, margin: '0 auto', fontFamily: 'sans-serif' }}>
          {/* Header */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 16px', borderBottom: '1px solid #eee', background: '#fff', position: 'sticky', top: 0, zIndex: 10 }}>
            <button onClick={() => dirty ? setModalOpen(true) : onBack()} style={{ background: 'none', border: 'none', color: '#1a73e8', fontWeight: 600, cursor: 'pointer', fontSize: 14 }}>← Back</button>
            <strong style={{ fontSize: 15 }}>{project.customer_name || 'New Estimate'}</strong>
            <button onClick={() => { persistLocally(); setModalOpen(true); }} disabled={syncing}
              style={{ background: 'none', border: 'none', color: syncing ? '#aaa' : '#1a73e8', fontWeight: 600, cursor: 'pointer', fontSize: 14 }}>
              {syncing ? 'Saving…' : '💾 Save'}
            </button>
          </div>

          {/* Bid banner */}
          <div style={{ background: '#1a73e8', color: '#fff', padding: '14px 16px', textAlign: 'center' }}>
            <div style={{ display: 'flex', justifyContent: 'space-around', marginBottom: 6 }}>
              <div><div style={{ fontSize: 11, opacity: 0.8 }}>Materials</div><div style={{ fontWeight: 700 }}>${totalMaterials.toFixed(2)}</div></div>
              <div style={{ opacity: 0.3 }}>|</div>
              <div><div style={{ fontSize: 11, opacity: 0.8 }}>Labor</div><div style={{ fontWeight: 700 }}>${totalLabor.toFixed(2)}</div></div>
              <div style={{ opacity: 0.3 }}>|</div>
              <div><div style={{ fontSize: 11, opacity: 0.8 }}>Total Bid</div><div style={{ fontWeight: 800, fontSize: 20 }}>${grandTotal.toFixed(2)}</div></div>
            </div>
            <div style={{ fontSize: 11, opacity: 0.6 }}>{project.markup_percent ?? 20}% markup · client sees lump sum per section</div>
          </div>

          {/* Section cards */}
          <div style={{ padding: 16 }}>
            {state.sections.map(section => {
              const mats = materialsBySection[section.section_id] || [];
              const labs = laborBySection[section.section_id] || [];
              const lumpSum = lumpSumById[section.section_id] ?? 0;
              return (
                <div key={section.section_id} style={{ background: '#fff', border: '1px solid #eee', borderRadius: 8, padding: 16, marginBottom: 12 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                    <strong style={{ fontSize: 15 }}>{section.area_name}</strong>
                    <div style={{ textAlign: 'right' }}>
                      <div style={{ fontSize: 10, color: '#aaa', fontWeight: 600 }}>CLIENT PRICE</div>
                      <div style={{ fontSize: 17, fontWeight: 800, color: '#2e7d32' }}>${lumpSum.toFixed(2)}</div>
                    </div>
                  </div>

                  {mats.length > 0 && <>
                    <div style={{ fontSize: 10, fontWeight: 700, color: '#aaa', letterSpacing: 1, marginBottom: 6 }}>MATERIALS</div>
                    {mats.map(m => (
                      <div key={m.material_id} style={{ marginBottom: 10 }}>
                        <div style={{ fontSize: 13, color: '#333', marginBottom: 4 }}>{m.item_name}</div>
                        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                          <div><div style={{ fontSize: 10, color: '#999' }}>Qty</div>
                            <input type="number" value={m.qty} onChange={e => updateMaterial(m.material_id, 'qty', parseFloat(e.target.value) || 0)}
                              style={{ width: 60, padding: '4px 6px', border: '1px solid #ddd', borderRadius: 4, fontSize: 13, textAlign: 'center' }} /></div>
                          <div><div style={{ fontSize: 10, color: '#999' }}>$/unit</div>
                            <input type="number" value={m.unit_cost} onChange={e => updateMaterial(m.material_id, 'unit_cost', parseFloat(e.target.value) || 0)}
                              style={{ width: 70, padding: '4px 6px', border: '1px solid #ddd', borderRadius: 4, fontSize: 13, textAlign: 'center' }} /></div>
                          <strong style={{ marginLeft: 'auto', color: '#555', fontSize: 13 }}>${(m.qty * m.unit_cost).toFixed(2)}</strong>
                        </div>
                      </div>
                    ))}
                  </>}

                  {labs.length > 0 && <>
                    <div style={{ fontSize: 10, fontWeight: 700, color: '#aaa', letterSpacing: 1, marginTop: 10, marginBottom: 6 }}>LABOR</div>
                    {labs.map(l => (
                      <div key={l.labor_id} style={{ marginBottom: 10 }}>
                        <div style={{ fontSize: 13, color: '#333', marginBottom: 4 }}>{l.task_description}</div>
                        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                          <div><div style={{ fontSize: 10, color: '#999' }}>Crew</div>
                            <input type="number" value={l.crew_size} onChange={e => updateLabor(l.labor_id, 'crew_size', parseFloat(e.target.value) || 0)}
                              style={{ width: 50, padding: '4px 6px', border: '1px solid #ddd', borderRadius: 4, fontSize: 13, textAlign: 'center' }} /></div>
                          <div><div style={{ fontSize: 10, color: '#999' }}>Hrs</div>
                            <input type="number" value={l.hours_estimated} onChange={e => updateLabor(l.labor_id, 'hours_estimated', parseFloat(e.target.value) || 0)}
                              style={{ width: 55, padding: '4px 6px', border: '1px solid #ddd', borderRadius: 4, fontSize: 13, textAlign: 'center' }} /></div>
                          <div><div style={{ fontSize: 10, color: '#999' }}>$/hr</div>
                            <input type="number" value={l.hourly_rate} onChange={e => updateLabor(l.labor_id, 'hourly_rate', parseFloat(e.target.value) || 0)}
                              style={{ width: 60, padding: '4px 6px', border: '1px solid #ddd', borderRadius: 4, fontSize: 13, textAlign: 'center' }} /></div>
                          <strong style={{ marginLeft: 'auto', color: '#555', fontSize: 13 }}>${(l.crew_size * l.hours_estimated * l.hourly_rate).toFixed(2)}</strong>
                        </div>
                      </div>
                    ))}
                  </>}
                </div>
              );
            })}
          </div>

          <SaveProgressModal isOpen={modalOpen} onSave={handleSaveAccount} onClose={() => setModalOpen(false)} />
        </div>
      );
    }

    // ── App (root) ──────────────────────────────────────────────────────────

    const SCREEN = { ONBOARDING: 'onboarding', TEMPLATE_SELECT: 'template_select', ESTIMATOR: 'estimator' };

    function App() {
      const [screen, setScreen] = useState(SCREEN.ONBOARDING);
      const [authToken, setAuthToken] = useState(null);
      const [activeProject, setActiveProject] = useState(null);

      function handleOnboardingNext({ bizName, zip }) {
        const userId = `USR-${Date.now()}`;
        localCache.convertToPermanentUser(userId, `${userId}@local`, bizName, zip);
        setAuthToken(userId);
        setScreen(SCREEN.TEMPLATE_SELECT);
      }

      function handleTemplateSelected(template) {
        const now = new Date().toISOString();
        const project = {
          project_id: `PRJ-${Date.now()}`,
          user_id: localCache.getSaveState().user.user_id,
          customer_name: null,
          customer_address: null,
          project_type: template.title,
          status: 'draft',
          total_materials_cost: 0,
          total_labor_cost: 0,
          markup_percent: 20,
          total_bid: 0,
          created_at: now,
          last_modified_at: now
        };
        // Stamp project_id onto seeded rows
        const sections = template.sections.map(s => ({ ...s }));
        const materials = template.materials.map(m => ({ ...m, project_id: project.project_id }));
        const labor = template.labor.map(l => ({ ...l, project_id: project.project_id }));
        localCache.saveProjectOffline(project, sections, materials, labor);
        setActiveProject(project);
        setScreen(SCREEN.ESTIMATOR);
      }

      if (screen === SCREEN.ONBOARDING) return <OnboardingScreen onNext={handleOnboardingNext} />;
      if (screen === SCREEN.TEMPLATE_SELECT) return <TemplateSelector onSelect={handleTemplateSelected} />;
      if (screen === SCREEN.ESTIMATOR) return <EstimatorDashboard project={activeProject} authToken={authToken} onBack={() => setScreen(SCREEN.TEMPLATE_SELECT)} />;
      return null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
